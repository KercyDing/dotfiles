add_newline = true

format = """
$directory$git_branch$git_status
$character"""

[directory]
style = "cyan"
truncation_length = 4

[git_branch]
symbol = "@"
style = "bold yellow"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[✗](bold red)"

[package]
disabled = true

[git_status]
style = "bold red"
format = "[$all_status]($style)"
untracked = "*"
modified = "*"
staged = "*"
